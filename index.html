<!doctype html>
<html lang="ja">
  <head>
    <title>Pokeke</title>
    <meta charset="utf-8" />
    <meta name="description" content="PokeAPIを使って遊んでみよう!のサイト" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="src/style.css" />
    <script src="src/main.ts" type="module"></script>
  </head>
  <body>
    <h1>Pokeke</h1>
    <form method="get" class="form" id="poke-form">
      <div class="form">
        <label for="id">図鑑No.を入力</label>
        <input type="text" name="id" id="poke-id" />
        <button type="submit">検索</button>
      </div>
    </form>
    <div id="poke-container">
      <div id="error">
        <p id="error-msg"></p>
      </div>
      <div id="main">
        <p id="poke-name"></p>
        <img id="poke-image" alt="" />
      </div>
      <div id="stats">
        <p id="stats-h"></p>
        <p id="stats-a"></p>
        <p id="stats-b"></p>
        <p id="stats-c"></p>
        <p id="stats-d"></p>
        <p id="stats-s"></p>
      </div>
    </div>
  </body>
</html>
